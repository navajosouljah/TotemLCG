name: Totem Challenge Target Finder

# Every Wednesday, research the week's most notable challenge-worthy finance
# figures and commit a Target Brief (HTML + Markdown) for editorial review.
on:
  schedule:
    - cron: "0 13 * * 3"   # Wednesdays 13:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: "Reference date (YYYY-MM-DD); blank = today"
        required: false
        default: ""
      count:
        description: "Number of candidates"
        required: false
        default: "4"

permissions:
  contents: write

jobs:
  find-targets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Find targets
        run: |
          python totem_challenge/find_targets.py \
            ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }} \
            --count ${{ github.event.inputs.count || '4' }}
      - name: Commit brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No new brief to commit."
          else
            git commit -m "Totem Challenge: target brief $(date -u +%Y-%m-%d)"
            git push
          fi
