name: Market Pulse Newsletter

# Builds the weekly Market Pulse issue every Monday and commits it to
# automation/output/. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 11 * * 1"   # Mondays 11:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: "Reference date (YYYY-MM-DD); blank = today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Generate newsletter
        run: |
          python generate.py --pdf ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Market Pulse: weekly issue $(date -u +%Y-%m-%d)"
            git push
          fi
